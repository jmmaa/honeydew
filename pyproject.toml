






[tool.ruff]
line-length = 88
indent-width = 4

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"
docstring-code-format = true


[tool.ruff.lint]
select = ['ALL']
ignore = ['COM812']
exclude = ["tests", "examples"]


[tool.ruff.lint.pydocstyle]
convention = "google"


[tool.ruff.lint.pycodestyle]
max-doc-length = 72
